version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: false

output:
  formats:
    text:
      path: stdout

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - durationcheck
    - exhaustive
    - gosec
    - misspell
    - noctx
    - prealloc
    - predeclared
    - reassign
    - unconvert
    - unparam
    - whitespace

linters-settings:
  gosec:
    severity: medium
    confidence: medium
  misspell:
    locale: US

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: ".*_test\\.go$"
      linters:
        - errcheck
