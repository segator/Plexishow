name: Release Please

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # IMPORTANT: Using GITHUB_TOKEN means release-please PR merges + tag creations
          # will NOT trigger other workflows (CI, Release). To chain them, create a PAT
          # with repo scope, add it to repo secrets as GH_PAT, and use it below.
          #
          # token: ${{ secrets.GH_PAT }}
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: go
          package-name: plexishow
          target-branch: main
          config-file: .release-please-manifest.json
          manifest-file: .release-please-manifest.json
