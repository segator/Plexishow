name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # Dagger Cloud token for cache sharing (free at dagger.io/cloud).
  # Add your token as a GitHub secret named DAGGER_CLOUD_TOKEN.
  DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Format Check
        run: |
          mage fmt
          git diff --exit-code || (echo "Code not formatted. Run 'mage fmt'" && exit 1)

      - name: Vet
        run: mage vet

      - name: Lint (Dagger)
        run: mage lint

      - name: Coverage (Dagger)
        run: mage cover

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

      - name: Tests (Dagger)
        run: mage test

      - name: Build (Dagger)
        run: mage build

      - name: Generate SBOM (Dagger)
        run: mage sbom

      - name: Vulnerability Scan (Dagger)
        run: mage vulnscan

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  publish-dev:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          experimental: true
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Publish Dev Image
        run: mage docker
        env:
          VERSION: dev
