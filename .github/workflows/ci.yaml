name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Helm registry login
        run: helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

      - name: Format
        run: |
          mage fmt
          git diff --exit-code -- '*.go' || { echo "Run 'mage fmt' locally"; exit 1; }

      - name: Lint
        run: mage lint

      - name: Test
        run: mage test

      - name: Build
        run: mage build
        env:
          VERSION: dev

      - name: Push multi-arch Docker image and OCI Helm Chart
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: mage publish
        env:
          VERSION: dev

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - uses: docker/setup-buildx-action@v3
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Helm registry login
        run: helm registry login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Docker image and Helm Chart
        run: |
          # 1. Publish core release (Docker image & Helm chart) under the SemVer version
          TAG_SEMVER="${GITHUB_REF_NAME#v}"
          VERSION="${TAG_SEMVER}" mage publish
          
          # 2. Publish extra Docker tags (full tag with 'v' and minor version tag)
          VERSION="${GITHUB_REF_NAME}" mage docker:push
          MINOR="${GITHUB_REF_NAME%.*}"
          VERSION="${MINOR}" mage docker:push
