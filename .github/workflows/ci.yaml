name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  # Dagger Cloud token for cache sharing (optional, free at dagger.io/cloud)
  DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Mage
        run: go install github.com/magefile/mage@latest

      - name: Install Dagger CLI
        run: curl -L https://dl.dagger.io/dagger/install.sh | sh

      - name: Format Check
        run: |
          mage fmt
          git diff --exit-code || (echo "Code not formatted. Run 'mage fmt'" && exit 1)

      - name: Vet
        run: mage vet

      - name: Tests (Dagger)
        run: mage test

      - name: Build (Dagger)
        run: mage build

      - name: Generate SBOM (Dagger)
        run: mage sbom

      - name: Vulnerability Scan (Dagger)
        run: mage vulnscan

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  publish-dev:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Install Mage
        run: go install github.com/magefile/mage@latest
      - name: Install Dagger CLI
        run: curl -L https://dl.dagger.io/dagger/install.sh | sh
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Publish Dev Image
        run: mage docker
        env:
          VERSION: dev
